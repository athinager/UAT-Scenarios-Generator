# Deploy static site to GitHub Pages.
#
# Repository setup (required once):
# Settings → Pages → Build and deployment → Source: "GitHub Actions"
#
# Optional: Settings → Secrets → Actions → VITE_VERCEL_API_URL = your Vercel API base URL
# (no trailing slash), so the built app calls your API in production.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          # GitHub Pages is static — bake Vercel API origin into the client bundle.
          VITE_VERCEL_API_URL: ${{ secrets.VITE_VERCEL_API_URL || 'https://uat-scenarios-generator-cu34qa8q6.vercel.app' }}

      - name: Verify build output
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing — check vite build"; exit 1; }
          ls -la dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    # Omit named environment so optional protection rules cannot block first deploys.
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
